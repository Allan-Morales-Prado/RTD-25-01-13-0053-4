<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tipos de inputs</title>
</head>

<body>
  <form action="">
    <!-- Texto normal -->
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre">

    <!-- Contraseña (oculta) -->
    <label for="clave">Contraseña:</label>
    <input type="password" id="clave" name="clave">

    <!-- Email con validación -->
    <label for="correo">Correo electrónico:</label>
    <input type="email" id="correo" name="correo">

    <!-- Teléfono -->
    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" name="telefono">

    <!-- Número con límites -->
    <label for="edad">Edad:</label>
    <input type="number" id="edad" name="edad" min="18" max="99">

    <!-- Fecha -->
    <label for="nacimiento">Fecha de nacimiento:</label>
    <input type="date" id="nacimiento" name="nacimiento">

    <!-- Checkbox -->
    <input type="checkbox" id="terminos" name="terminos">
    <label for="terminos">Acepto los términos y condiciones</label>

    <label for="mensaje">Mensaje:</label>
    <textarea id="mensaje" name="mensaje" rows="5" cols="40"></textarea>

    <label for="pais">País:</label>
    <select id="pais" name="pais">
      <option value="cl">Chile</option>
      <option value="ar">Argentina</option>
      <option value="pe">Perú</option>
      <option value="mx">México</option>
    </select>

    <!-- Opción preseleccionada -->
    <label for="mes">Mes: </label>
    <select id="mes" name="mes">
      <option value="1">Enero</option>
      <option value="2" selected>Febrero</option>
      <option value="3">Marzo</option>
    </select>

    <!-- Grupo de opciones con <optgroup> -->
    <label for="producto">Producto: </label>
    <select id="producto" name="producto">
      <optgroup label="Electrónica">
        <option value="laptop">Laptop</option>
        <option value="mouse">Mouse</option>
      </optgroup>
      <optgroup label="Ropa">
        <option value="camisa">Camisa</option>
        <option value="pantalon">Pantalón</option>
      </optgroup>
    </select>
  </form>
</body>

</html>
