<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas HTML - Ejemplo02</title>
</head>

<body>
  <table>
    <caption>Título de la tabla</caption>

    <thead>
      <tr>
        <th>Encabezado 1</th>
        <th>Encabezado 2</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Dato 1</td>
        <td>Dato 2</td>
      </tr>
    </tbody>

    <tfoot>
      <tr>
        <td>Total: 100</td>
      </tr>
    </tfoot>
  </table>
</body>

</html>
