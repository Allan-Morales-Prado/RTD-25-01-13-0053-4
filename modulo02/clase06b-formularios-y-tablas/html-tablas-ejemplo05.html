<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas HTML - Ejemplo05</title>
</head>
<body>
  <table border="1">
  <caption>Eventos de marzo</caption>
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Evento</th>
      <th>Ubicación</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td rowspan="2">15 de marzo</td>
      <td>Conferencia Web</td>
      <td>Sala A</td>
    </tr>
    <tr>
      <td>Taller de CSS</td>
      <td>Sala B</td>
    </tr>
    <tr>
      <td>22 de marzo</td>
      <td>Hackathon</td>
      <td>Auditorio</td>
    </tr>
  </tbody>
</table>
</body>
</html>
