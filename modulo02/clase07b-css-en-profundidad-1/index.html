<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloc, inline, inline-block</title>
  <style>
    #dimentioned{
      width:300px;
      height:500px;
    }
  </style>
</head>
<body>
  <h2>Elementos Block</h2>
  <p>Un párrafo es un elemento block</p>

  <h2>Elementos inline</h2>
  <span>Un span es un elemento inline</span><em>Este es otro elemento inline</em><p id="dimentioned">Este es un párrafo (elemento block)</p>
</body>
</html>
